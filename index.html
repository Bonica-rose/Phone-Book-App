<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Phone Book App</title>
    <meta name="description" content="A Phone Book web application using HTML, Bootstrap 5.3, and JavaScript.">    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container min-vh-100 my-4">
    
        <!-- HEADER -->
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3">
            <h3 class="text-center text-md-start">📱 Phone Book</h3>
            <div class="d-flex gap-2 justify-content-center">
                <button class="btn btn-outline-primary" id="tableViewBtn">
                    <i class="fa fa-table"></i>
                </button>
                <button class="btn btn-outline-success" id="cardViewBtn">
                    <i class="fa fa-id-card"></i>
                </button>
                <button class="btn btn-primary" id="addBtn">
                    <i class="fa fa-plus"></i> Add
                </button>
            </div>
        </div>
    
        <!-- SEARCH -->
        <input type="text" id="search" class="form-control mb-3" placeholder="Search contact by name or phone number...">
    
        <!-- TABLE VIEW -->
        <div id="tableContainer" class="table-responsive">
            <table class="table table-bordered align-middle table-striped">
                <thead class="table-primary">
                    <tr>
                        <th>Name</th>
                        <th class="d-none d-md-table-cell">Email</th>
                        <th>Phone</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="contactTable"></tbody>
            </table>
        </div>
    
        <!-- CARD VIEW -->
        <div class="row d-none" id="cardContainer"></div>
    </div>        
        
    <!-- MODAL -->
    <div class="modal fade" id="contactModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Contact</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-2">
                        <input id="name" class="form-control" placeholder="Name">
                        <div class="invalid-feedback">Name is required.</div>
                    </div>
                    <div class="mb-2">
                        <input id="email" class="form-control" placeholder="Email">
                        <div class="invalid-feedback">Enter a valid email.</div>
                    </div>
                    <div class="mb-2">
                        <input id="phone" class="form-control" placeholder="Phone">
                        <div class="invalid-feedback">The phone number must have 10 digits.</div>
                    </div>
                </div>
    
                <div class="modal-footer">
                    <button class="btn btn-primary" id="saveBtn">Save</button>
                </div>
            </div>
        </div>
    </div>
        
    <footer>
        <p>© 2026 Phone Book App</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
